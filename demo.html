<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全封闭 KV 管理系统</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 700px; margin: 2rem auto; padding: 0 1rem; background: #f5f5f5; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 1.5rem; }
        h1, h2 { color: #333; margin-top: 0; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: #555; }
        input, textarea { width: 100%; padding: 10px; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-family: monospace; }
        input:focus, textarea:focus { border-color: #007bff; outline: none; }
        .btn-group { display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: opacity 0.2s; color: white; }
        button:hover { opacity: 0.9; }
        .btn-read { background: #007bff; }
        .btn-save { background: #28a745; }
        .btn-del { background: #dc3545; }
        #status { margin-top: 1rem; padding: 10px; border-radius: 6px; display: none; }
        .success { background: #d4edda; color: #155724; display: block !important; }
        .error { background: #f8d7da; color: #721c24; display: block !important; }
        .info { background: #e2e3e5; color: #383d41; display: block !important; }
    </style>
</head>
<body>

    <h1>🔒 全封闭 KV 管理系统</h1>
    <p style="color:#666; font-size:0.9rem;">注意：所有操作（包括读取）都必须验证 UUID。</p>

    <!-- 配置卡片 -->
    <div class="card">
        <h2>⚙️ 连接配置</h2>
        <label>API 地址 (URL)</label>
        <input type="text" id="apiUrl" value="https://你的项目.pages.dev/api/site_config" placeholder="https://.../api/你的Key名">
        
        <label>UUID 密钥 (X-API-Key) <span style="color:red">*</span></label>
        <input type="password" id="apiKey" placeholder="填入你的_SECRET_KEY_UUID" value="">
        <small style="color:#888">没有密钥将无法读取或写入任何数据。</small>
    </div>

    <!-- 数据操作卡片 -->
    <div class="card">
        <h2>📝 数据内容 (JSON)</h2>
        <label>网站标题</label>
        <input type="text" id="dataTitle" placeholder="例如：我的个人主页">
        
        <label>详细配置 (JSON 格式)</label>
        <textarea id="dataContent" rows="8" placeholder='{"author": "Name", "theme": "dark"}'></textarea>
        
        <div class="btn-group">
            <button class="btn-read" onclick="loadData()">📥 读取数据</button>
            <button class="btn-save" onclick="saveData()">💾 保存数据</button>
            <button class="btn-del" onclick="deleteData()">🗑️ 删除数据</button>
        </div>
    </div>

    <div id="status"></div>

    <script>
        const statusDiv = document.getElementById('status');

        function showStatus(msg, type) {
            statusDiv.textContent = msg;
            statusDiv.className = type; // success, error, info
        }

        function getConfig() {
            const url = document.getElementById('apiUrl').value.trim();
            const key = document.getElementById('apiKey').value.trim();
            if (!url || !key) {
                showStatus('❌ 错误：请填写完整的 API 地址和 UUID 密钥！', 'error');
                return null;
            }
            return { url, key };
        }

        // 1. 读取数据 (GET) - 现在也需要 UUID!
        async function loadData() {
            const config = getConfig();
            if (!config) return;

            showStatus('⏳ 正在请求数据...', 'info');

            try {
                const res = await fetch(config.url, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-API-Key': config.key // 🔑 必须带密钥，否则返回 401
                    }
                });

                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('dataTitle').value = data.title || '';
                    // 格式化显示 JSON
                    document.getElementById('dataContent').value = JSON.stringify(data, null, 4);
                    showStatus('✅ 读取成功！', 'success');
                } else if (res.status === 401) {
                    showStatus('🚫 拒绝访问 (401): UUID 密钥错误或缺失！', 'error');
                } else if (res.status === 404) {
                    showStatus('⚠️ 数据不存在 (404)，你可以尝试新建。', 'info');
                    document.getElementById('dataTitle').value = '';
                    document.getElementById('dataContent').value = '';
                } else {
                    showStatus(`❌ 请求失败: ${res.status}`, 'error');
                }
            } catch (e) {
                showStatus(`❌ 网络错误: ${e.message}`, 'error');
            }
        }

        // 2. 保存数据 (PUT)
        async function saveData() {
            const config = getConfig();
            if (!config) return;

            const title = document.getElementById('dataTitle').value;
            let contentObj = {};
            
            try {
                const raw = document.getElementById('dataContent').value;
                contentObj = raw ? JSON.parse(raw) : {};
            } catch (e) {
                showStatus('❌ 错误：内容区域必须是合法的 JSON 格式！', 'error');
                return;
            }

            const finalData = { ...contentObj, title: title, updated_at: new Date().toISOString() };

            showStatus('⏳ 正在保存...', 'info');

            try {
                const res = await fetch(config.url, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-API-Key': config.key
                    },
                    body: JSON.stringify(finalData)
                });

                if (res.ok) {
                    showStatus('✅ 数据保存成功！', 'success');
                } else if (res.status === 401) {
                    showStatus('🚫 拒绝访问 (401): UUID 密钥错误！', 'error');
                } else {
                    showStatus(`❌ 保存失败: ${res.status}`, 'error');
                }
            } catch (e) {
                showStatus(`❌ 网络错误: ${e.message}`, 'error');
            }
        }

        // 3. 删除数据 (DELETE)
        async function deleteData() {
            if (!confirm('确定要删除此数据吗？操作不可恢复！')) return;
            
            const config = getConfig();
            if (!config) return;

            showStatus('⏳ 正在删除...', 'info');

            try {
                const res = await fetch(config.url, {
                    method: 'DELETE',
                    headers: {
                        'X-API-Key': config.key
                    }
                });

                if (res.ok) {
                    showStatus('✅ 数据已删除！', 'success');
                    document.getElementById('dataTitle').value = '';
                    document.getElementById('dataContent').value = '';
                } else if (res.status === 401) {
                    showStatus('🚫 拒绝访问 (401): UUID 密钥错误！', 'error');
                } else {
                    showStatus(`❌ 删除失败: ${res.status}`, 'error');
                }
            } catch (e) {
                showStatus(`❌ 网络错误: ${e.message}`, 'error');
            }
        }
    </script>
</body>
</html>
